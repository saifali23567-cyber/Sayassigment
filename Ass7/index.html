<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
   <center> 
    <h2>Personal Infromation Form</h2>
    <form>
        <label for="fullName">Full Name:</label>
        <input type="text" id="fullName" name="fullName" 
        placeholder="Enter your name" required>
        
        <br> <br>
        <label for="fatherName">Father Name:</label>
        <input type="text" id="fatherName" name="fatherName"
        placeholder="Enter your father name" required>
        
        <br> <br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" 
        placeholder="Enter your email" required>
        
        <br> <br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password"
        placeholder="Enter your password" required>       
           
        <br> <br>
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone"
        placeholder="eg: +92-301-3651951" required>
        
        <br> <br>
        <label for="cnic">CNIC:</label>
        <input type="text" id="cnic" name="cnic"
        placeholder="eg: 12345-1234567-1" maxlength="15" required>
        
        <br> <br>
        <label for="dob">DOB:</label>
        <input type="date" id="dob" name="dob" 
        placeholder="Enter your age" required>
        
        <br> <br>
        <label>Gender:</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>

        <br> <br>
        <label>Skills:</label>
        <input type="checkbox" id="html" name="skill"> 
        <label for="html">HTML</label>
        
        <input type="checkbox" id="css" name="skill"> 
        <label for="css">CSS</label>

        <input type="checkbox" id="js" name="skill"> 
        <label for="js">JavaScript</label>
        
        <input type="checkbox" id="react" name="skill"> 
        <label for="react">React</label>
        
        <br> <br>
        <label for="education">Education:</label>
        <select id="education" name="education">
            <option value="matric">Matric</option>
            <option value="intermediate">Intermediate</option>
            <option value="bachelor">Bachelor</option>
            <option value="master">Master</option>
        </select>
        
        <br> <br>
        <label for="city">City:</label>
        <select id="city" name="city">
            <option value="karachi">Karachi</option>
            <option value="lahore">Lahore</option>
            <option value="islamabad">Islamabad</option>
            <option value="peshawar">Peshawar</option>
            <option value="quetta">Quetta</option>
        </select>
        
        <br> <br>
        <label for="picture">Upload Picture:</label>
        <input type="file" id="picture" name="picture">
        
        <br><br>
        <label for="cv">Upload CV:</label>
        <input type="file" id="cv" name="cv">
        
        <br><br>
        <label for="address">Address:</label>
        <textarea id="address" name="address" required></textarea>
        
        <br><br>
        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms">I agree to the terms 
        and conditions</label>
        
        <br> <br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset"> 
    </form>
    </center>
</body>
</html>
